# ══════════════════════════════════════════════════════════════════════════════
# SENSORS
# ══════════════════════════════════════════════════════════════════════════════

# Reads battery % from register 0x2D and charging status from register 0x00
# AXP2101 I2C address: 0x34
# axp2101 ESPHome component not yet released — using direct I2C reads instead

sensor:
  # Battery level — AXP2101 reg 0xA4 = SOC (state of charge) 0–100%
  # FIX from v1: register 0x2D was wrong (that's a config register, not SOC)
  # The correct AXP2101 fuel gauge register is 0xA4 (BAT_PERCENT_DATA)
  - platform: template
    id: battery_level_pct
    name: "Battery Level"
    unit_of_measurement: "%"
    accuracy_decimals: 0
    update_interval: 60s
    lambda: |-
      if (auto b = id(axp2101_dev).read_byte(0xA4)) {
        uint8_t v = b.value();
        // AXP2101 returns 0xFF / >100 when gauge not initialized — filter those
        if (v <= 100) {
          return (float)v;
        }
      }
      return NAN;
    on_value:
      then:
        - lvgl.label.update:
            id: batt_pct_label
            text: !lambda |-
              static char buf[8];
              snprintf(buf, sizeof(buf), "%d%%", (int)x);
              return buf;
        - lvgl.bar.update:
            id: batt_bar
            value: !lambda return (int)x;
        - script.execute: apply_charge_ui

  # ── Print sensors ──────────────────────────────────────────────────────────
  - platform: homeassistant
    id: print_progress_sensor
    entity_id: sensor.${printer_id}_print_progress
    filters:
      - throttle: 3s
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lvgl.arc.update:
                  id: progress_arc
                  value: !lambda return (int)x;
              - lvgl.arc.update:
                  id: progress_arc_ams
                  value: !lambda return (int)x;
              - lvgl.arc.update:
                  id: progress_arc_ctrl
                  value: !lambda return (int)x;
              - script.execute: render_time_readout
              - script.execute: update_arc_color

  - platform: homeassistant
    id: remaining_time
    entity_id: sensor.${printer_id}_remaining_time
    filters:
      # heartbeat (not throttle): re-emits the latest value every interval so the
      # label always converges to HA's current reading. `throttle` passed only the
      # first sample per window and dropped the rest, which could latch the label
      # at a stale transient (e.g. nozzle stuck at 251° while HA read 50°) when the
      # value then settled quietly with no further change events.
      - heartbeat: 3s
    on_value:
      then:
        - script.execute: render_time_readout

  - platform: homeassistant
    id: current_layer
    entity_id: sensor.${printer_id}_current_layer
    filters:
      - throttle: 3s
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lvgl.label.update:
                  id: layer_label
                  text: !lambda |-
                    static char buf[24];
                    int tot = id(total_layers).has_state() ? (int)id(total_layers).state : 0;
                    snprintf(buf, sizeof(buf), "%d / %d", (int)x, tot);
                    return buf;

  - platform: homeassistant
    id: total_layers
    entity_id: sensor.${printer_id}_total_layer_count
    filters:
      - throttle: 30s
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lvgl.label.update:
                  id: layer_label
                  text: !lambda |-
                    static char buf[24];
                    int cur = id(current_layer).has_state() ? (int)id(current_layer).state : 0;
                    snprintf(buf, sizeof(buf), "%d / %d", cur, (int)x);
                    return buf;

  - platform: homeassistant
    id: left_nozzle_temp
    entity_id: sensor.${printer_id}_left_nozzle_temperature
    filters:
      # heartbeat (not throttle): re-emits the latest value every interval so the
      # label always converges to HA's current reading. `throttle` passed only the
      # first sample per window and dropped the rest, which could latch the label
      # at a stale transient (e.g. nozzle stuck at 251° while HA read 50°) when the
      # value then settled quietly with no further change events.
      - heartbeat: 3s
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lvgl.label.update:
                  id: left_nozzle_label
                  text: !lambda |-
                    static char buf[8]; snprintf(buf, sizeof(buf), "%.0f°", x); return buf;
              - lvgl.label.update:
                  id: idle_left_nozzle_label
                  text: !lambda |-
                    static char buf[8]; snprintf(buf, sizeof(buf), "%.0f°", x); return buf;
              - script.execute: update_nozzle_active

  - platform: homeassistant
    id: right_nozzle_temp
    entity_id: sensor.${printer_id}_right_nozzle_temperature
    filters:
      # heartbeat (not throttle): re-emits the latest value every interval so the
      # label always converges to HA's current reading. `throttle` passed only the
      # first sample per window and dropped the rest, which could latch the label
      # at a stale transient (e.g. nozzle stuck at 251° while HA read 50°) when the
      # value then settled quietly with no further change events.
      - heartbeat: 3s
    on_value:
      then:
        - if:
            condition:
              lambda: return !isnan(x);
            then:
              - lvgl.label.update:
                  id: right_nozzle_label
                  text: !lambda |-
                    static char buf[8];
                    if (x < 1.0f) { snprintf(buf, sizeof(buf), "--"); }
                    else { snprintf(buf, sizeof(buf), "%.0f°", x); }
                    return buf;
              - lvgl.label.update:
                  id: idle_right_nozzle_label
                  text: !lambda |-
                    static char buf[8];
                    if (x < 1.0f) { snprintf(buf, sizeof(buf), "--"); }
                    else { snprintf(buf, sizeof(buf), "%.0f°", x); }
                    return buf;
              - script.execute: update_nozzle_active

  # Reference active-nozzle temp — printer reports the in-use nozzle here.
  # Whichever of left/right matches this is the active nozzle (→ white).
  - platform: homeassistant
    id: active_nozzle_temp
    entity_id: sensor.${printer_id}_nozzle_temperature
    filters:
      # heartbeat (not throttle): re-emits the latest value every interval so the
      # label always converges to HA's current reading. `throttle` passed only the
      # first sample per window and dropped the rest, which could latch the label
      # at a stale transient (e.g. nozzle stuck at 251° while HA read 50°) when the
      # value then settled quietly with no further change events.
      - heartbeat: 3s
    on_value:
      then:
        - script.execute: update_nozzle_active

  - platform: homeassistant
    id: bed_temp
