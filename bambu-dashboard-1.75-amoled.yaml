# ══════════════════════════════════════════════════════════════════════════════
# LVGL v9.5.0 · Studio v2 design — Apple-esque
# 466×466 · 4 pages: Home (adaptive) · AMS · Camera · Control
# Activity ring: 300° sweep, 10 o'clock → 2 o'clock, stroke 10px
# start_angle=120, end_angle=60 (LVGL v9 — correctly applied)
# ══════════════════════════════════════════════════════════════════════════════
lvgl:
  log_level: WARN
  color_depth: 16
  bg_color: 0x000000
  buffer_size: 50%
  touchscreens:
    - touchscreen_id: ts_disp1
  displays:
    - disp1
  page_wrap: true

  pages:

    # ════════════════════════════════════════════════════════════════════════
    # PAGE 1 — HOME (adaptive)
    # When idle: 9:41 clock face, ambient temps
    # When printing/paused: % hero, time remaining, stage, 3 temps, tray
    # ════════════════════════════════════════════════════════════════════════
    - id: page_home
      bg_color: 0x000000
      bg_opa: COVER
      on_load:
        - lambda: 'id(cur_page) = 0; id(prev_main) = 0;'
      widgets:

        # ── Progress arc (always visible) ─────────────────────────────────
        - arc:
            id: progress_arc
            x: 0
            y: 0
            width: 466
            height: 466
            min_value: 0
            max_value: 100
            value: 0
            start_angle: 120
            end_angle: 60
            arc_width: 10
            arc_color: col_arc_track
            arc_rounded: true
            adjustable: false
            bg_opa: TRANSP
            border_opa: TRANSP
            indicator:
              arc_width: 10
              arc_color: sys_green
              arc_rounded: true

        # ── IDLE GROUP (watch face style) ─────────────────────────────────
        - obj:
            id: home_idle_group
            x: 0
            y: 0
            width: 466
            height: 466
            bg_opa: TRANSP
            border_width: 0
            pad_all: 0
            scrollbar_mode: "OFF"
            scroll_dir: NONE
            clickable: false
            widgets:
              # Big "9:41" clock — hero (aligns with printing time-remaining)
              - label:
                  id: idle_clock_label
                  x: 33
                  y: 72
                  width: 400
                  text_align: CENTER
                  text: "9:41"
                  text_font: font_time_hero
                  text_color: col_white

              # "FRIDAY · NOV 15" tracked uppercase (aligns with stage)
              - label:
                  id: idle_date_label
                  x: 33
                  y: 196
                  width: 400
                  text_align: CENTER
                  text: ""
                  text_font: font_label_t
                  text_color: col_secondary

              # Printer name label (aligns with layer count)
              - label:
                  id: idle_bambu_label
                  x: 33
                  y: 232
                  width: 400
                  text_align: CENTER
                  text: "${printer_name}"
                  text_font: font_med
                  text_color: col_secondary

              # ── 3 ambient temp complications (same Y as printing) ───
              - obj:
                  x: 78
                  y: 292
                  width: 108
                  height: 64
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  clickable: false
                  widgets:
                    - label:
                        x: 0
                        y: 0
                        width: 108
                        text_align: CENTER
                        text: "LEFT"
                        text_font: font_comp
                        text_color: col_tertiary
