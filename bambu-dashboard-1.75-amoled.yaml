    # ════════════════════════════════════════════════════════════════════════
    # PAGE 5 — SCREENSAVER (flowing dot clusters)
    # Code-driven: the 10ms interval above creates a recycled pool of LVGL
    # circle objects (added as children of this page at runtime) and animates
    # clusters of random-coloured dots that flow out, bounce and fade. Nothing
    # is declared here but the two nav zones. Tap left/right to leave.
    # ════════════════════════════════════════════════════════════════════════
    - id: page_screensaver
      bg_color: 0x000000
      bg_opa: COVER
      skip: true            # reached by swipe-down only, not the L/R carousel
      on_load:
        - lambda: 'id(cur_page) = 6;'
      widgets:

        # Hidden placeholder — forces ESPHome to compile LVGL line support
        # (LV_USE_LINE) so the screensaver lambda can lv_line_create() its
        # shooting-star streaks at runtime. Never drawn.
        - line:
            hidden: true
            points:
              - [0, 0]
              - [1, 1]
            line_width: 1
            line_color: 0xFFFFFF

        # (Navigation is by swipe — see touchscreen on_release. Swipe up = settings,
        #  swipe left/right = back to the carousel.)
