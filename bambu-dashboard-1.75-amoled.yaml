        - obj:
            x: 91
            y: 250
            width: 72
            height: 72
            radius: 36
            bg_color: 0x1F1F1F
            bg_opa: COVER
            border_width: 0
            pad_all: 0
            clickable: true
            on_click:
              - if:
                  condition:
                    lambda: 'return !id(was_swipe);'
                  then:
                    - lambda: |-
                        id(brightness_pct) -= 10;
                        if (id(brightness_pct) < 10) id(brightness_pct) = 10;
                    - script.execute: apply_brightness
