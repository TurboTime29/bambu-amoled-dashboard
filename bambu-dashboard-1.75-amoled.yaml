# ── Binary sensors ────────────────────────────────────────────────────────────
binary_sensor:
  # AXP2101 charging detection — reg 0x01 (PMU_STATUS2) bits 7:5 = charge status
  # 000 = tri-state (not charging)
  # 001 = pre-charge        ← charging
  # 010 = constant current  ← charging
  # 011 = constant voltage  ← charging
  # ── Charging detection ─────────────────────────────────────────────────────
  # AXP2101 PMU_STATUS1 (reg 0x00) bit 5 (0x20) = VBUS present (USB connected).
  # This is the most reliable single bit for "plugged in / charging" — the
  # charge-state bits in reg 0x01 vary by silicon revision and were unreliable.
  # When USB is present the cell is charging (or topped off); when absent we're
  # on battery.
  - platform: template
    id: axp_charging
    name: "Charging"
    # HA-reported only. State is published from the charge-detection interval
    # (see `interval:`), which also owns is_charging_global + apply_charge_ui —
    # this template binary_sensor's on_state does NOT fire reliably in this
    # build, so we do not depend on it for local state/UI.

# ── Text sensors ──────────────────────────────────────────────────────────────
text_sensor:
  - platform: homeassistant
    id: print_status_sensor
    entity_id: sensor.${printer_id}_print_status
    on_value:
      then:
        - lambda: |-
            std::string s = x;
            std::transform(s.begin(), s.end(), s.begin(), ::tolower);
            bool printing = (s == "running" || s == "prepare");
            bool paused   = (s.find("pause") != std::string::npos);
            id(is_printing) = printing;
            id(is_paused)   = paused;
            if (!paused) {
              // Restore solid color when unpausing
              id(arc_flash_state) = true;
            }
        - script.execute: update_arc_color
        - script.execute: update_home_view
        - if:
            condition:
              lambda: |-
                std::string s = x;
                std::transform(s.begin(), s.end(), s.begin(), ::tolower);
                return (s == "running" || s == "prepare");
            then:
              - lvgl.page.show: page_home

  # End-of-print time. HA reports UTC ISO-8601, e.g. "2026-06-09T16:09:00+00:00".
  # We parse the UTC wall-clock fields, convert to a UTC epoch (civil-days math),
  # then localtime_r() applies the configured timezone (DST-aware) → "12:09 PM".
  - platform: homeassistant
    id: end_time_sensor
    entity_id: sensor.${printer_id}_end_time
    on_value:
      then:
        - lambda: |-
            int Y, Mo, D, h, mi;
            if (sscanf(x.c_str(), "%d-%d-%dT%d:%d", &Y, &Mo, &D, &h, &mi) == 5) {
              int y = Y; unsigned m = (unsigned)Mo, d = (unsigned)D;
              y -= (m <= 2);
              int era = (y >= 0 ? y : y - 399) / 400;
              unsigned yoe = (unsigned)(y - era * 400);
              unsigned doy = (153u * (m + (m > 2 ? -3 : 9)) + 2) / 5 + d - 1;
              unsigned doe = yoe * 365 + yoe / 4 - yoe / 100 + doy;
              long days = (long)era * 146097 + (long)doe - 719468;   // days since 1970-01-01 UTC
              time_t epoch = (time_t)days * 86400 + h * 3600 + mi * 60;
              struct tm lt;
              localtime_r(&epoch, &lt);
              int h12 = lt.tm_hour % 12; if (h12 == 0) h12 = 12;
              char buf[16];
              snprintf(buf, sizeof(buf), "%d:%02d %s", h12, lt.tm_min, lt.tm_hour < 12 ? "AM" : "PM");
              id(end_time_str) = buf;
            } else {
              id(end_time_str) = "";
            }
        - script.execute: render_time_readout

  - platform: homeassistant
    id: current_stage
    entity_id: sensor.${printer_id}_current_stage
    on_value:
      then:
        - lvgl.label.update:
            id: stage_label
            text: !lambda |-
              std::string stage = x;
              if (stage.empty() || stage == "idle" || stage == "Idle") {
                if (id(print_progress_sensor).has_state() && id(print_progress_sensor).state >= 100) {
                  return "Cooling";
                }
                return "Idle";
              }
              // Convert "auto_bed_leveling" -> "Auto Bed Leveling"
              bool cap = true;
              for (size_t i = 0; i < stage.length(); i++) {
                if (cap && isalpha(stage[i])) { stage[i] = toupper(stage[i]); cap = false; }
                else if (stage[i] == '_') { stage[i] = ' '; cap = true; }
                else stage[i] = tolower(stage[i]);
              }
              return stage.c_str();
        - lambda: |-
            // Apple system colors based on state
            std::string s = x;
            std::transform(s.begin(), s.end(), s.begin(), ::tolower);
            uint32_t color;
            if (s.find("error") != std::string::npos)       color = 0xFF453A;  // sys-red
            else if (s.find("pause") != std::string::npos)  color = 0xFF9F0A;  // sys-orange
            else if (s == "printing" || s == "running")     color = 0x30D158;  // sys-green
            else if (id(print_progress_sensor).has_state() && id(print_progress_sensor).state >= 100)
                                                            color = 0x0A84FF;  // sys-blue (cooling)
            else                                            color = 0xBF5AF2;  // sys-purple (other stages)
            lv_obj_set_style_text_color(id(stage_label), lv_color_hex(color), LV_PART_MAIN);

  - platform: homeassistant
