  - id: sys_red      # error, low battery
    hex: "FF453A"
  - id: sys_teal     # humidity, info
    hex: "64D2FF"
  - id: sys_purple   # other stages
    hex: "BF5AF2"
  - id: sys_yellow   # AMS HT accent
    hex: "FFE580"
  # Neutral scale
  - id: col_white    # primary text
    hex: "FFFFFF"
  - id: col_secondary # 65% white
    hex: "A6A6A6"
  - id: col_tertiary  # 35% white
    hex: "595959"
  - id: col_quaternary # 18% white
    hex: "2E2E2E"
